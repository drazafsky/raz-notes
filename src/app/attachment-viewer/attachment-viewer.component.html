<div class="mt-1">
  @if (loading) {
    <span class="text-xs text-theme-muted">Loading attachment…</span>
  } @else if (error) {
    <span class="text-xs text-theme-accent">Failed to load {{ attachment.name }}</span>
  } @else {
    @if (category === 'image') {
      <img
        [src]="safeUrl"
        [alt]="attachment.name"
        class="max-h-64 rounded border border-theme-border object-contain"
      />
    } @else if (category === 'video') {
      <video
        controls
        [src]="safeUrl"
        class="max-h-64 w-full rounded border border-theme-border"
      ></video>
    } @else if (category === 'audio') {
      <audio controls [src]="safeUrl" class="w-full"></audio>
    } @else if (category === 'pdf') {
      <iframe
        [src]="safeResourceUrl"
        class="h-64 w-full rounded border border-theme-border"
        [title]="attachment.name"
      ></iframe>
    } @else {
      <a
        [href]="safeUrl"
        [download]="attachment.name"
        class="inline-flex items-center gap-1 text-sm text-theme-accent underline hover:text-theme-text"
      >
        📎 {{ attachment.name }}
      </a>
    }
  }
</div>
